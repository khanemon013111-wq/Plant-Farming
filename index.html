<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .balance { font-size: 40px; margin-top: 50px; color: #00d2ff; }
        .shark-btn { width: 200px; margin-top: 50px; cursor: pointer; transition: 0.1s; }
        .shark-btn:active { transform: scale(0.9); }
        .btn-blue { background: #3a7bd5; border: none; padding: 15px; color: #fff; border-radius: 10px; width: 80%; margin-top: 20px; }
    </style>
</head>
<body>
    <p>AVAILABLE BALANCE</p>
    <div class="balance" id="bal">2070</div>
    <img src="https://img.icons8.com/color/200/shark.png" class="shark-btn" onclick="tap()">
    <br>
    <button class="btn-blue">WATCH VIDEO (+10)</button>

    <script>
        let balance = 2070;
        function tap() {
            balance += 10;
            document.getElementById('bal').innerText = balance;
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Farming App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .balance-text { font-size: 32px; font-weight: bold; color: #00ff88; }
        .plant-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-top: 15px; background: rgba(255,255,255,0.07); border-radius: 15px; }
        .locked { filter: grayscale(1); opacity: 0.5; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #aaa; }
    </style>
</head>
<body>

    <div class="glass-card">
        <p>Total Balance</p>
        <div class="balance-text"><span id="user-balance">0</span> 🪙</div>
    </div>

    <div id="farm-grid">
        <!-- Tier 1 -->
        <div class="plant-card">
            <div style="text-align: left;"><strong>Aloe Vera</strong><br><small>10 Coins / 8h</small></div>
            <button onclick="mine(10)">Start</button>
        </div>
        <!-- Tier 2 -->
        <div class="plant-card locked" id="tier2-card">
            <div style="text-align: left;"><strong>Money Plant</strong><br><small>50 Coins / 8h (Req: 2 Ref)</small></div>
            <button id="btn-tier2" onclick="mine(50)" disabled>Locked</button>
        </div>
    </div>

    <script>
        // আপনার Firebase Client Config এখানে দিন
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user.id;

        // ইউজারের ডাটা রিয়েল-টাইম আপডেট
        db.ref('users/' + uid).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                document.getElementById('user-balance').innerText = data.balance;
                if (data.referrals >= 2) {
                    document.getElementById('tier2-card').classList.remove('locked');
                    document.getElementById('btn-tier2').disabled = false;
                    document.getElementById('btn-tier2').innerText = "Start";
                }
            }
        });

        function mine(amount) {
            // Monetag Ad Link
            window.open("YOUR_MONETAG_DIRECT_LINK", "_blank");
            
            // কয়েন যোগ করা (সিম্পল লজিক)
            db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + amount);
            tg.showAlert("কয়েন যোগ হয়েছে!");
        }
        tg.expand();
    </script>
</body>
</html>

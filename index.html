<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Farming Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0b0e11;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg); color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Header / Balance */
        .header {
            position: sticky; top: 0; background: rgba(11, 14, 17, 0.9);
            backdrop-filter: blur(15px); padding: 20px; z-index: 1000;
            border-bottom: 1px solid var(--border); text-align: center;
        }
        .balance-val { font-size: 36px; font-weight: 800; color: var(--primary); text-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .balance-label { font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* Navigation Content */
        .page { display: none; padding: 15px; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Plant List Grid */
        .plant-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        
        .plant-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .plant-info { display: flex; align-items: center; gap: 15px; }
        .plant-icon {
            font-size: 28px; background: rgba(255,255,255,0.05);
            width: 55px; height: 55px; display: flex;
            align-items: center; justify-content: center; border-radius: 18px;
        }
        .plant-meta h4 { margin: 0; font-size: 17px; color: #fff; }
        .plant-meta p { margin: 4px 0 0; font-size: 12px; color: var(--primary); font-weight: 500; }

        /* Lock Styling */
        .locked-card { filter: blur(5px); opacity: 0.4; pointer-events: none; }
        .lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .lock-text { color: #fbbf24; font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 10px; border: 1px solid #fbbf24; }

        /* Action Button */
        .btn-mine {
            background: var(--primary); color: #000; border: none;
            padding: 12px 20px; border-radius: 14px; font-weight: 800;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,255,136,0.2);
        }
        .btn-mine:active { transform: scale(0.92); }
        .pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0px rgba(0,255,136,0.5); } 70% { box-shadow: 0 0 0 10px rgba(0,255,136,0); } 100% { box-shadow: 0 0 0 0px rgba(0,255,136,0); } }

        /* Navigation Bar */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #161a1e;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid var(--border); z-index: 2000;
        }
        .nav-item { text-align: center; font-size: 11px; color: #888; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Other Pages Text */
        .page h3 { text-align: center; margin-top: 20px; font-size: 22px; color: var(--primary); }
    </style>
</head>
<body>

    <!-- Top Balance Section -->
    <div class="header">
        <div class="balance-label">Total Coins Acquired</div>
        <div class="balance-val"><span id="coin-balance">0</span> 🪙</div>
    </div>

    <!-- HOME PAGE: Mining Plants -->
    <div id="home" class="page active-page">
        <div class="plant-list" id="plant-container">
            <!-- JavaScript will load 10 plants here -->
        </div>
    </div>

    <!-- REFER PAGE -->
    <div id="refer" class="page">
        <h3>Referral Program</h3>
        <div style="background: var(--glass); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--border); margin-top: 20px;">
            <p style="opacity: 0.7;">Your Successful Invites</p>
            <h2 id="ref-count" style="color: var(--primary); font-size: 48px; margin: 10px 0;">0</h2>
            <button class="btn-mine" style="width: 100%; padding: 18px; margin-top: 10px;" onclick="copyRef()">Copy Invite Link</button>
        </div>
    </div>

    <!-- LEADERBOARD PAGE -->
    <div id="leaderboard" class="page">
        <h3>Top Ranking Farmers</h3>
        <div id="leader-list" style="margin-top:20px; text-align: center; opacity: 0.5;">
            Coming Soon...
        </div>
    </div>

    <!-- WITHDRAW PAGE -->
    <div id="withdraw" class="page">
        <h3>Cash Out</h3>
        <div style="background: var(--glass); padding: 20px; border-radius: 24px; border: 1px solid var(--border); margin-top: 20px;">
            <p>Select Method</p>
            <select style="width: 100%; padding: 14px; border-radius: 12px; background: #222; color: #fff; border: 1px solid #444; margin-bottom: 15px;">
                <option>Bkash</option>
                <option>Nagad</option>
                <option>Binance (USDT)</option>
            </select>
            <p>Wallet Address / Number</p>
            <input type="text" placeholder="Enter details..." style="width: 92%; padding: 14px; border-radius: 12px; background: #222; color: #fff; border: 1px solid #444;">
            <button class="btn-mine" style="width: 100%; margin-top: 25px; padding: 18px;" onclick="tg.showAlert('Withdrawal request sent!')">Withdraw Coins</button>
        </div>
    </div>

    <!-- Fixed Bottom Navigation Bar -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><span>🌿</span>Home</div>
        <div class="nav-item" onclick="showPage('refer', this)"><span>👥</span>Refer</div>
        <div class="nav-item" onclick="showPage('leaderboard', this)"><span>🏆</span>Leader</div>
        <div class="nav-item" onclick="showPage('withdraw', this)"><span>💰</span>Wallet</div>
    </div>

    <script>
        // --- 1. Firebase Config (আপনারটা বসাবেন) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        tg.expand();
        const uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345;

        // --- 2. Data of 10 Plants ---
        const plants = [
            { id: 1, name: "Aloe Vera", icon: "🌿", req: 0, reward: 10, type: "free" },
            { id: 2, name: "Money Plant", icon: "🌱", req: 1, reward: 25, type: "free" },
            { id: 3, name: "Bamboo", icon: "🎋", req: 2, reward: 50, type: "free" },
            { id: 4, name: "Cactus", icon: "🌵", req: 3, reward: 75, type: "free" },
            { id: 5, name: "Bonsai", icon: "🌳", req: 4, reward: 100, type: "free" },
            { id: 6, name: "Oak Tree", icon: "🌲", req: 6, reward: 150, type: "free" },
            { id: 7, name: "Palm Tree", icon: "🌴", req: 8, reward: 200, type: "free" },
            { id: 8, name: "Golden Rose", icon: "🌹", req: 10, reward: 300, type: "free" },
            { id: 9, name: "Diamond Leaf", icon: "💎", req: "Paid", reward: 500, type: "paid" },
            { id: 10, name: "Sotata VIP Tree", icon: "👑", req: "Paid", reward: 1000, type: "paid" }
        ];

        // --- 3. Home Rendering Function ---
        function renderHome(userRefs = 0, paidTiers = {}) {
            const container = document.getElementById('plant-container');
            container.innerHTML = ''; // ক্লিয়ার করা

            plants.forEach(p => {
                let isLocked = false;
                let lockMsg = "";

                if (p.type === "free") {
                    if (userRefs < p.req) {
                        isLocked = true;
                        lockMsg = `Invite ${p.req} Friends to Unlock`;
                    }
                } else {
                    if (!paidTiers || !paidTiers[p.id]) {
                        isLocked = true;
                        lockMsg = "Buy Tier from Admin";
                    }
                }

                container.innerHTML += `
                    <div style="position: relative;">
                        ${isLocked ? `<div class="lock-overlay"><span class="lock-text">🔒 ${lockMsg}</span></div>` : ''}
                        <div class="plant-card ${isLocked ? 'locked-card' : ''}">
                            <div class="plant-info">
                                <div class="plant-icon">${p.icon}</div>
                                <div class="plant-meta">
                                    <h4>${p.name}</h4>
                                    <p>+${p.reward} Coins / 8h Cycle</p>
                                </div>
                            </div>
                            <button class="btn-mine pulse" onclick="startMining(${p.reward})">Start</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- 4. Logic Functions ---
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            el.classList.add('active');
        }

        function startMining(reward) {
            tg.HapticFeedback.impactOccurred('medium');
            window.open("https://your-monetag-direct-link.com", "_blank"); // আপনার অ্যাড লিঙ্ক দিন
            
            db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + reward);
            tg.showAlert(`Mining Started! ${reward} coins will be added.`);
        }

        function copyRef() {
            const link = `https://t.me/YOUR_BOT_USERNAME?start=${uid}`;
            navigator.clipboard.writeText(link);
            tg.showAlert("Referral link copied to clipboard!");
        }

        // --- 5. Firebase Sync & Initial Run ---
        // প্রথমেই একবার রেন্ডার করে নেওয়া যাতে স্ক্রিন খালি না থাকে
        renderHome(0, {});

        // এরপর ডাটাবেস থেকে রিয়েল ডাটা আনা
        db.ref('users/' + uid).on('value', (snap) => {
            const data = snap.val() || { balance: 0, referrals: 0 };
            document.getElementById('coin-balance').innerText = data.balance.toLocaleString();
            document.getElementById('ref-count').innerText = data.referrals;
            renderHome(data.referrals, data.paidTiers);
        });

    </script>
</body>
</html>
